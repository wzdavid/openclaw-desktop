<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      font-size: 52px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .status {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 40px;
    }

    .bar-track {
      width: 200px;
      height: 3px;
      background: #1e2535;
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #ef4444, #f97316);
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(550%); }
    }
  </style>
</head>
<body>
  <div class="logo">🦞</div>
  <div class="title">OpenClaw</div>
  <div class="status">Starting gateway…</div>
  <div class="bar-track">
    <div class="bar-fill"></div>
  </div>
</body>
</html>
