name: Release

# Release workflow:
# - builds and signs installers on CI
# - publishes assets to this repository's GitHub Releases
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── macOS x64 (signed + notarized) ──────────────────────────────────────────
  release-mac-x64:
    name: Release macOS (x64)
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag and version
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "Release workflow must run from a v* tag. Current ref: ${GITHUB_REF}"
            exit 1
          fi

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          # Allow exact match (e.g. v0.4.0) or prerelease suffix based on package version
          # (e.g. tag v0.4.0-rc.1 while package.json is 0.4.0).
          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" && "${TAG_VERSION}" != "${PKG_VERSION}"-* ]]; then
            echo "Tag/package version mismatch: tag=${TAG_VERSION}, package.json=${PKG_VERSION}"
            exit 1
          fi

          echo "Validated release context: tag=${GITHUB_REF_NAME}, package.json=${PKG_VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python tooling for node-gyp
        run: python -m pip install --upgrade pip setuptools

      - name: Verify python
        run: |
          python --version
          python -c "import sys; print(sys.executable)"

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_python: python

      - name: Validate macOS signing secrets
        run: |
          test -n "${{ secrets.MAC_CERTS }}" || { echo "Missing secret: MAC_CERTS"; exit 1; }
          test -n "${{ secrets.MAC_CERTS_PASSWORD }}" || { echo "Missing secret: MAC_CERTS_PASSWORD"; exit 1; }
          test -n "${{ secrets.APPLE_ID }}" || { echo "Missing secret: APPLE_ID"; exit 1; }
          test -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" || { echo "Missing secret: APPLE_APP_SPECIFIC_PASSWORD"; exit 1; }
          test -n "${{ secrets.APPLE_TEAM_ID }}" || { echo "Missing secret: APPLE_TEAM_ID"; exit 1; }

      - name: Bundle Node.js + openclaw
        run: bash scripts/bundle-node.sh
        env:
          ARCH_OVERRIDE: x64

      - name: Import code signing certificate
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_b64 = os.environ["MAC_CERTS_BASE64"]
          cert_path = Path(os.environ["GITHUB_WORKSPACE"]) / "certificate.p12"
          cert_path.write_bytes(base64.b64decode(cert_b64))
          print(f"Certificate written to: {cert_path}")
          PY
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS }}

      - name: Ensure release exists for current tag
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release already exists for ${GITHUB_REF_NAME}"
          else
            if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
              gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --prerelease --generate-notes
            else
              gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --generate-notes
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS app
        run: |
          ulimit -n 65536
          npm run build
          ./node_modules/.bin/electron-rebuild -f -w node-pty --arch x64
          ./node_modules/.bin/electron-builder --mac dmg zip --x64 --publish never
        env:
          CSC_LINK: ${{ github.workspace }}/certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          npm_config_python: python

      - name: Upload macOS x64 release assets
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            release/*.dmg \
            release/*-mac.zip \
            release/*.blockmap \
            release/latest-mac.yml \
            --clobber \
            --repo "${GITHUB_REPOSITORY}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64
          path: |
            release/*.dmg
            release/*-mac.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: warn

  # ── macOS arm64 (signed + notarized) ────────────────────────────────────────
  release-mac-arm64:
    name: Release macOS (arm64)
    needs: release-mac-x64
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python tooling for node-gyp
        run: python -m pip install --upgrade pip setuptools

      - name: Verify python
        run: |
          python --version
          python -c "import sys; print(sys.executable)"

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_python: python

      - name: Validate macOS signing secrets
        run: |
          test -n "${{ secrets.MAC_CERTS }}" || { echo "Missing secret: MAC_CERTS"; exit 1; }
          test -n "${{ secrets.MAC_CERTS_PASSWORD }}" || { echo "Missing secret: MAC_CERTS_PASSWORD"; exit 1; }
          test -n "${{ secrets.APPLE_ID }}" || { echo "Missing secret: APPLE_ID"; exit 1; }
          test -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" || { echo "Missing secret: APPLE_APP_SPECIFIC_PASSWORD"; exit 1; }
          test -n "${{ secrets.APPLE_TEAM_ID }}" || { echo "Missing secret: APPLE_TEAM_ID"; exit 1; }

      - name: Bundle Node.js + openclaw
        run: bash scripts/bundle-node.sh
        env:
          ARCH_OVERRIDE: arm64

      - name: Import code signing certificate
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_b64 = os.environ["MAC_CERTS_BASE64"]
          cert_path = Path(os.environ["GITHUB_WORKSPACE"]) / "certificate.p12"
          cert_path.write_bytes(base64.b64decode(cert_b64))
          print(f"Certificate written to: {cert_path}")
          PY
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS }}

      - name: Build macOS app
        run: |
          ulimit -n 65536
          npm run build
          ./node_modules/.bin/electron-rebuild -f -w node-pty --arch arm64
          ./node_modules/.bin/electron-builder --mac dmg zip --arm64 --publish never
        env:
          CSC_LINK: ${{ github.workspace }}/certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          npm_config_python: python

      - name: Upload macOS arm64 release assets
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            release/*arm64*.dmg \
            release/*arm64*-mac.zip \
            release/*arm64*.blockmap \
            --clobber \
            --repo "${GITHUB_REPOSITORY}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            release/*arm64*.dmg
            release/*arm64*-mac.zip
            release/*arm64*.blockmap
          if-no-files-found: warn

  # ── Windows ─────────────────────────────────────────────────────────────────
  release-win:
    name: Release Windows
    needs: release-mac-arm64
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python tooling for node-gyp
        run: python -m pip install --upgrade pip setuptools

      - name: Verify python
        run: |
          python --version
          python -c "import sys; print(sys.executable)"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          npm_config_python: python
          npm_config_msvs_version: 2022
          GYP_MSVS_VERSION: 2022

      - name: Rebuild native dependencies for Electron
        run: npx electron-builder install-app-deps
        env:
          npm_config_python: python
          npm_config_msvs_version: 2022
          GYP_MSVS_VERSION: 2022

      - name: Bundle Node.js + openclaw
        run: powershell -ExecutionPolicy Bypass -File scripts/bundle-node.ps1

      - name: Build Windows app (no publish)
        run: npm run build:win:lite
        env:
          npm_config_python: python
          npm_config_msvs_version: 2022
          GYP_MSVS_VERSION: 2022

      - name: Upload Windows release assets
        shell: pwsh
        run: |
          $patterns = @(
            "release/*Setup*.exe",
            "release/*.exe.blockmap",
            "release/latest*.yml"
          )
          $files = @()
          foreach ($pattern in $patterns) {
            $files += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          }
          $files = $files | Sort-Object -Unique
          if (-not $files -or $files.Count -eq 0) { throw "No Windows release assets found (expected setup exe/blockmap/latest*.yml under release/)." }
          Write-Host "Uploading Windows release assets:"
          $files | ForEach-Object { Write-Host " - $_" }
          gh release upload $env:GITHUB_REF_NAME $files --clobber --repo $env:GITHUB_REPOSITORY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/**/*.exe
            release/**/*.yml
            release/**/*.blockmap
          if-no-files-found: warn
